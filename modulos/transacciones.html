<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transacciones — Mi Banco</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="appToast" class="toast align-items-center text-white bg-success border-0">
    <div class="d-flex">
      <div class="toast-body" id="toastBody">OK</div>
      <button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-banco">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="dashboard.html"><i class="bi bi-bank me-2"></i>MI BANCO</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto align-items-center gap-2">
        <li class="nav-item">
          <span class="nav-link" style="color:var(--color-acento);font-weight:600">
            <i class="bi bi-person-circle me-1"></i><span id="userName">Cliente</span>
          </span>
        </li>
        <li><button class="btn btn-sm btn-outline-light" id="btnLogout">
          <i class="bi bi-box-arrow-right me-1"></i>Cerrar sesión
        </button></li>
      </ul>
    </div>
  </div>
</nav>

<div class="portal-layout">
  <nav class="sidebar d-none d-lg-block">
    <ul class="nav flex-column">
      <li><a class="nav-link" href="dashboard.html"><i class="bi bi-grid-1x2"></i> Dashboard</a></li>
      <li><a class="nav-link active" href="transacciones.html"><i class="bi bi-arrow-left-right"></i> Transacciones</a></li>
      <li><a class="nav-link" href="pagos.html"><i class="bi bi-credit-card"></i> Pagos</a></li>
      <li><a class="nav-link" href="prestamos.html"><i class="bi bi-cash-stack"></i> Préstamos</a></li>
      <li><a class="nav-link" href="ahorro.html"><i class="bi bi-piggy-bank"></i> Ahorro</a></li>
    </ul>
  </nav>

  <main class="main-content">
    <h4 class="fw-bold mb-1"><i class="bi bi-arrow-left-right me-2 text-primary"></i>Historial de Transacciones</h4>
    <p class="text-muted small mb-4">Últimos 20 movimientos de tus cuentas</p>

    <!-- Filtros -->
    <div class="card border-0 shadow-sm mb-4">
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-12 col-md-3">
            <label class="form-label small fw-semibold">Tipo de movimiento</label>
            <select id="filtroTipo" class="form-select">
              <option value="">Todos</option>
              <option value="debito">Débito (salidas)</option>
              <option value="credito">Crédito (entradas)</option>
            </select>
          </div>
          <div class="col-12 col-md-3">
            <label class="form-label small fw-semibold">Fecha desde</label>
            <input type="date" id="filtroDesde" class="form-control">
          </div>
          <div class="col-12 col-md-3">
            <label class="form-label small fw-semibold">Fecha hasta</label>
            <input type="date" id="filtroHasta" class="form-control">
          </div>
          <div class="col-12 col-md-3 d-flex gap-2">
            <button class="btn btn-primary flex-fill" id="btnFiltrar">
              <i class="bi bi-search me-1"></i>Filtrar
            </button>
            <button class="btn btn-outline-secondary" id="btnLimpiar">
              <i class="bi bi-x-lg"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Resumen rápido -->
    <div class="row g-3 mb-4" id="resumenCards">
      <div class="col-6 col-md-3">
        <div class="card border-0 bg-light text-center p-3">
          <div class="text-muted small">Total movimientos</div>
          <div class="fw-bold fs-4" id="resTotal">—</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card border-0 bg-light text-center p-3">
          <div class="text-muted small">Total débitos</div>
          <div class="fw-bold fs-5 text-danger" id="resDebitos">—</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card border-0 bg-light text-center p-3">
          <div class="text-muted small">Total créditos</div>
          <div class="fw-bold fs-5 text-success" id="resCreditoss">—</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card border-0 bg-light text-center p-3">
          <div class="text-muted small">Balance neto</div>
          <div class="fw-bold fs-5" id="resNeto">—</div>
        </div>
      </div>
    </div>

    <!-- Tabla -->
    <div class="card border-0 shadow-sm">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-striped table-hover mb-0" id="tablaTxn">
            <thead class="table-dark">
              <tr>
                <th class="ps-3">Fecha</th>
                <th>Descripción</th>
                <th>Cuenta</th>
                <th>Tipo</th>
                <th class="text-end pe-3">Monto</th>
              </tr>
            </thead>
            <tbody id="txnBody">
              <tr><td colspan="5" class="text-center py-4">
                <div class="spinner-border text-primary"></div>
                <p class="text-muted mt-2 mb-0">Cargando transacciones...</p>
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="../js/transacciones.js"></script>

</body>
</html>
