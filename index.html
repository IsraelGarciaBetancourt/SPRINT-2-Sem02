<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — Mi Banco</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<style>
    /* Estilos mínimos necesarios para centrar la tarjeta si no están en tu CSS externo */
    body {
      background-color: #f8f9fa;
    }
    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-card {
      width: 100%;
      max-width: 400px;
      border: none;
      border-radius: 1rem;
      box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
    }
    .auth-logo {
      font-weight: 800;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>

  <div class="auth-wrapper">
    <div class="card auth-card p-4">

      <div class="text-center mb-4">
        <div class="bg-primary bg-opacity-10 d-inline-block p-3 rounded-circle mb-2">
          <i class="bi bi-bank2 text-primary fs-1"></i>
        </div>
        <h2 class="auth-logo h4 mb-0">MI BANCO</h2>
        <p class="text-muted small">Portal de Banca en Línea</p>
      </div>

      <div id="alertError" class="alert alert-danger d-none" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span id="alertMsg">Error al iniciar sesión.</span>
      </div>

      <form id="formLogin">
        
        <div class="mb-3">
          <label for="email" class="form-label fw-semibold mb-1">Correo electrónico</label>
          <div class="input-group">
            <span class="input-group-text bg-light"><i class="bi bi-envelope text-muted"></i></span>
            <input type="email" id="email" class="form-control" placeholder="cliente@mimail.com" required>
          </div>
          <div class="form-text mt-1 text-truncate">
            Ej: <span class="font-monospace opacity-75">clientedeprueba@empresa.com</span>
          </div>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label fw-semibold mb-1">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text bg-light"><i class="bi bi-lock text-muted"></i></span>
            <input type="password" id="password" class="form-control" placeholder="Mínimo 8 caracteres" required minlength="8">
            <button class="btn btn-outline-secondary border-start-0" type="button" id="togglePwd">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <div class="form-text mt-1">
            Ej: <span class="font-monospace opacity-75">password123</span>
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label small" for="rememberMe">Recordarme</label>
          </div>
          <a href="#" class="small text-decoration-none">¿Olvidé mi contraseña?</a>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" id="btnLogin">
          <span id="btnLoginText">
            <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
          </span>
          <span id="btnLoginSpinner" class="d-none">
            <span class="spinner-border spinner-border-sm me-2" role="status"></span>Verificando...
          </span>
        </button>
      </form>

      <div class="text-center mt-4">
        <hr class="text-muted opacity-25">
        <p class="small text-muted mb-0">
          ¿No tienes cuenta? 
          <a href="registro.html" class="text-primary fw-bold text-decoration-none">Regístrate aquí</a>
        </p>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { supabase, requireAuth } from '../js/supabase.js';

    // Si ya hay sesión activa → ir directo al dashboard
    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.replace('/modulos/dashboard.html');

    // ── Toggle ver/ocultar contraseña ──────────────────────
    document.getElementById('togglePwd').addEventListener('click', () => {
      const input = document.getElementById('password');
      const icon = document.querySelector('#togglePwd i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
      }
    });

    // ── Submit login ───────────────────────────────────────
    document.getElementById('formLogin').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Mostrar spinner en botón
      document.getElementById('btnLoginText').classList.add('d-none');
      document.getElementById('btnLoginSpinner').classList.remove('d-none');
      document.getElementById('alertError').classList.add('d-none');

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        document.getElementById('alertMsg').textContent =
          'Correo o contraseña incorrectos. Verifica tus datos.';
        document.getElementById('alertError').classList.remove('d-none');
        document.getElementById('btnLoginText').classList.remove('d-none');
        document.getElementById('btnLoginSpinner').classList.add('d-none');
        return;
      }

      // Éxito → redirigir al dashboard
      window.location.replace('/modulos/dashboard.html');
    });
  </script>
</body>

</html>
